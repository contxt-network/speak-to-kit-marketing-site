<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Kit — Style Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,ital,wght@9..144,0,400;9..144,0,500;9..144,0,600;9..144,1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style-guide/tokens.css">
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--ink-50);color:var(--ink-700);font-family:'Inter',ui-sans-serif,system-ui,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  a{color:inherit;text-decoration:none}
  button{font:inherit}

  /* ===== Layout shell ===== */
  .sg-app{display:grid;grid-template-columns:260px 1fr;min-height:100vh;max-width:1440px;margin:0 auto}
  .sg-sidebar{position:sticky;top:0;height:100vh;overflow-y:auto;border-right:1px solid var(--rule);background:#fff;padding:28px 22px 32px}
  .sg-sidebar-brand{display:flex;align-items:center;gap:10px;font-weight:600;letter-spacing:-0.01em;font-size:16px;margin-bottom:6px}
  .sg-sidebar-brand svg{color:var(--accent)}
  .sg-sidebar-sub{font-size:12px;color:var(--ink-muted);margin-bottom:24px}
  .sg-nav-group{margin-bottom:20px}
  .sg-nav-title{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-muted);font-weight:600;margin:0 0 8px}
  .sg-nav-link{display:block;font-size:13px;color:var(--ink-primary);padding:5px 8px;border-radius:4px;line-height:1.4}
  .sg-nav-link:hover{background:var(--surface-alt)}
  .sg-nav-link.active{background:var(--accent-soft);color:var(--accent)}

  .sg-main{padding:56px 64px 120px;max-width:none}
  .sg-hero{padding-bottom:48px;border-bottom:1px solid var(--rule);margin-bottom:56px}
  .sg-hero-kicker{font-size:11px;letter-spacing:0.22em;color:var(--accent);font-weight:600;margin-bottom:16px}
  .sg-hero-title{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(44px, 5vw, 72px);letter-spacing:-0.025em;line-height:1.02;margin:0 0 20px;color:var(--ink-primary)}
  .sg-hero-title em{color:var(--accent);font-style:italic}
  .sg-hero-lede{font-size:17px;line-height:1.55;color:var(--ink-500);max-width:640px;margin:0 0 28px}
  .sg-hero-meta{display:flex;gap:28px;font-size:12px;color:var(--ink-muted);flex-wrap:wrap}
  .sg-hero-meta b{color:var(--ink-primary);font-weight:600}

  /* ===== Section ===== */
  .sg-section{padding:40px 0 64px;border-bottom:1px solid var(--rule)}
  .sg-section:last-child{border-bottom:0}
  .sg-section-head{margin-bottom:36px;max-width:820px}
  .sg-kicker{font-size:11px;letter-spacing:0.22em;color:var(--accent);font-weight:600;margin-bottom:12px}
  .sg-h2{font-family:'Fraunces',serif;font-weight:400;font-size:48px;letter-spacing:-0.025em;line-height:1.02;margin:0 0 16px;color:var(--ink-primary)}
  .sg-lede{font-size:17px;line-height:1.55;color:var(--ink-500);margin:0;text-wrap:pretty}

  .sg-sub{padding:24px 0 28px;border-top:1px dashed var(--rule)}
  .sg-sub:first-of-type{border-top:0;padding-top:0}
  .sg-sub-head{margin-bottom:20px;max-width:760px}
  .sg-h3{font-size:20px;font-weight:600;letter-spacing:-0.015em;margin:0 0 6px;color:var(--ink-primary)}
  .sg-note{font-size:14px;color:var(--ink-muted);margin:0;line-height:1.5}
  .sg-body{font-size:15px;color:var(--ink-primary);line-height:1.6;margin:0 0 14px}

  /* ===== Tokens, pills, code ===== */
  .sg-inline-code{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;background:var(--cream-50);color:var(--ink-500);padding:2px 7px;border-radius:4px;border:1px solid var(--rule);white-space:nowrap}
  .sg-inline-code-alt{background:var(--surface);color:var(--ink-400)}
  pre.sg-code{background:var(--ink-700);color:var(--cream-200);padding:18px 22px;border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.6;overflow-x:auto;margin:16px 0 0}

  /* ===== Colour scale ===== */
  .sg-scale{margin-bottom:28px}
  .sg-scale-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px;gap:16px}
  .sg-scale-name{font-size:16px;font-weight:600;letter-spacing:-0.01em}
  .sg-scale-desc{font-size:13px;color:var(--ink-muted);margin-top:2px;max-width:480px}
  .sg-scale-strip{display:grid;grid-template-columns:repeat(10,1fr);gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--rule)}
  .sg-scale-cell{font-size:10px}
  .sg-scale-hex{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--ink-muted);padding:6px 4px;text-align:center;background:var(--surface)}

  /* ===== Semantic tokens ===== */
  .sg-semantic-grid{display:grid;gap:2px;background:var(--rule);border-radius:8px;overflow:hidden;border:1px solid var(--rule)}
  .sg-semantic-row{display:grid;grid-template-columns:48px 1fr 140px 220px 180px;align-items:center;gap:14px;background:#fff;padding:10px 14px}
  .sg-semantic-swatch{width:32px;height:32px;border-radius:6px;justify-self:center}
  .sg-semantic-name{font-size:13px;font-weight:600;color:var(--ink-primary);font-family:'JetBrains Mono',monospace}
  .sg-semantic-desc{font-size:12px;color:var(--ink-muted);margin-top:2px}
  .sg-semantic-value{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--ink-500)}

  /* ===== Type split cards ===== */
  .sg-split{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px}
  .sg-split-card{background:#fff;border:1px solid var(--rule);border-radius:14px;padding:24px;box-shadow:var(--shadow-sm)}
  .sg-split-tag{display:flex;justify-content:space-between;align-items:center;gap:12px}
  .sg-split-title{font-size:14px;font-weight:600;color:var(--ink-primary)}
  .sg-split-weights{display:grid;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--rule)}
  .sg-split-note{font-size:12px;color:var(--ink-muted);margin-top:16px;line-height:1.5}

  /* ===== Type specimen list ===== */
  .sg-type-list{display:grid;gap:20px}
  .sg-type-row{display:grid;grid-template-columns:200px 1fr;gap:24px;align-items:baseline;padding:12px 0;border-bottom:1px dashed var(--rule)}
  .sg-type-row:last-child{border-bottom:0}
  .sg-type-label{font-size:12px;font-weight:600;color:var(--ink-primary);font-family:'JetBrains Mono',monospace}
  .sg-type-props{font-size:11px;color:var(--ink-muted);margin-top:4px;font-family:'JetBrains Mono',monospace}

  /* ===== Spacing ===== */
  .sg-space-grid{display:grid;gap:8px;max-width:620px}
  .sg-space-row{display:grid;grid-template-columns:100px 1fr 60px;align-items:center;gap:14px}
  .sg-space-bar-wrap{background:var(--cream-50);border-radius:4px;padding:8px 10px}
  .sg-space-bar{height:10px;background:var(--accent);border-radius:2px}
  .sg-space-val{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--ink-muted)}

  .sg-container-list{display:grid;gap:12px}
  .sg-container-row{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:center}
  .sg-container-bar-wrap{height:22px;border-radius:4px;background:var(--cream-50);border:1px solid var(--rule);position:relative}
  .sg-container-bar{height:100%;background:var(--accent-soft);border-right:2px solid var(--accent);display:flex;align-items:center;padding-left:10px;border-radius:4px 0 0 4px}
  .sg-container-bar span{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--accent);font-weight:600}
  .sg-container-meta{display:flex;gap:12px;align-items:baseline;flex-wrap:wrap}
  .sg-container-use{font-size:12px;color:var(--ink-muted)}

  .sg-rhythm-table{margin-top:12px;border:1px solid var(--rule);border-radius:8px;overflow:hidden}
  .sg-rhythm-head,.sg-rhythm-row{display:grid;grid-template-columns:1.8fr 80px 80px 2fr;gap:14px;padding:10px 14px;font-size:13px;align-items:center}
  .sg-rhythm-head{background:var(--cream-50);font-weight:600;font-size:11.5px;letter-spacing:0.04em;text-transform:uppercase;color:var(--ink-muted)}
  .sg-rhythm-row{border-top:1px solid var(--rule);color:var(--ink-primary)}

  /* ===== Radii + Shadows ===== */
  .sg-radii-grid,.sg-shadow-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .sg-radii-cell,.sg-shadow-cell{padding:16px;background:#fff;border:1px solid var(--rule);border-radius:8px;display:flex;flex-direction:column;gap:10px;align-items:flex-start}
  .sg-radii-demo{width:72px;height:72px;background:var(--accent-soft);border:1px solid var(--accent);display:grid;place-items:center;color:var(--accent)}
  .sg-radii-val{font-size:12px;font-family:'JetBrains Mono',monospace;font-weight:600}
  .sg-radii-use,.sg-shadow-use{font-size:11.5px;color:var(--ink-muted)}
  .sg-shadow-demo{width:100%;height:68px;background:#fff;border:1px solid var(--rule);border-radius:10px}

  /* ===== Motion ===== */
  .sg-motion-grid{display:grid;gap:14px;max-width:680px;margin-bottom:24px}
  .sg-motion-row{display:grid;grid-template-columns:130px 1fr 70px 1fr;gap:14px;align-items:center}
  .sg-motion-bar{height:24px;background:var(--cream-50);border-radius:4px;position:relative;overflow:hidden;padding:4px}
  .sg-motion-ball{width:16px;height:16px;border-radius:999px;background:var(--accent)}
  .sg-motion-val{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--ink-muted);text-align:right}
  .sg-motion-use{font-size:12px;color:var(--ink-muted)}
  .sg-motion-easings{display:grid;gap:8px;padding-top:14px;border-top:1px dashed var(--rule)}
  .sg-motion-easing-row{display:grid;grid-template-columns:130px 2fr 1fr;gap:14px;align-items:center;font-size:12px}

  /* ===== Icons ===== */
  .sg-icon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;background:var(--rule);border-radius:8px;overflow:hidden;border:1px solid var(--rule)}
  .sg-icon-cell{padding:18px;background:#fff;display:flex;flex-direction:column;align-items:center;gap:10px;aspect-ratio:1}
  .sg-icon-name{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--ink-muted)}

  /* ===== Do/Don't ===== */
  .sg-dodont{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}
  .sg-dodont-item{background:#fff;border:1px solid var(--rule);border-radius:10px;overflow:hidden}
  .sg-dodont-tag{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:12px;font-weight:600;letter-spacing:0.02em;border-bottom:1px solid var(--rule)}
  .sg-do .sg-dodont-tag{background:rgba(46,168,83,0.08);color:#1e7a3c}
  .sg-dont .sg-dodont-tag{background:rgba(226,90,74,0.08);color:#a8352a}
  .sg-dodont-dot{width:8px;height:8px;border-radius:999px;display:inline-block}
  .sg-do-dot{background:var(--success)}
  .sg-dont-dot{background:var(--danger)}
  .sg-dodont-body{padding:18px}
  .sg-dodont-demo{display:flex;align-items:center;justify-content:flex-start;min-height:68px;margin-bottom:12px;padding:8px 0}
  .sg-dodont-text{margin:0;font-size:13px;line-height:1.5;color:var(--ink-500)}

  /* ===== Callout ===== */
  .sg-callout{border-left:3px solid var(--accent);background:var(--accent-soft);padding:14px 18px;border-radius:0 10px 10px 0;margin:24px 0}
  .sg-callout-warn{border-left-color:#b88a00;background:rgba(184,138,0,0.08)}
  .sg-callout-title{font-size:12px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
  .sg-callout-warn .sg-callout-title{color:#8a6600}
  .sg-callout-body{font-size:14px;line-height:1.55;color:var(--ink-primary)}

  /* ===== Surface chips ===== */
  .sg-surface-chips{display:inline-flex;gap:6px}
  .sg-chip{font-size:10px;font-weight:600;letter-spacing:0.06em;padding:3px 8px;border-radius:999px;text-transform:uppercase}
  .sg-chip-marketing{background:var(--cream-100);color:var(--ink-500);border:1px solid var(--cream-400)}
  .sg-chip-app{background:var(--ink-50);color:var(--ink-500);border:1px solid var(--ink-100)}

  /* ===== Demo rows ===== */
  .sg-demo-row{display:flex;gap:28px;flex-wrap:wrap;align-items:flex-start}
  .sg-demo-stack{display:flex;flex-direction:column;gap:10px;align-items:flex-start}
  .sg-demo-lbl{font-size:11px;color:var(--ink-muted);font-family:'JetBrains Mono',monospace}

  .sg-state-grid{display:grid;grid-template-columns:repeat(3,minmax(200px,1fr));gap:18px;margin-top:8px}
  .sg-state-cell{background:var(--cream-50);border:1px dashed var(--rule);border-radius:8px;padding:18px;display:flex;flex-direction:column;gap:10px;align-items:flex-start}

  .sg-spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.35);border-top-color:#fff;border-radius:999px;animation:sg-spin 800ms linear infinite;display:inline-block}
  @keyframes sg-spin{to{transform:rotate(360deg)}}

  .sg-anatomy{padding-left:18px;margin:0;font-size:13.5px;color:var(--ink-primary);line-height:1.7}
  .sg-anatomy li{margin-bottom:4px}

  /* ===== Handoff ===== */
  .sg-handoff-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:36px}
  .sg-handoff-card{background:#fff;border:1px solid var(--rule);border-radius:12px;padding:24px;display:flex;flex-direction:column;gap:12px;transition:box-shadow 200ms var(--ease-kit), transform 200ms var(--ease-kit);cursor:pointer}
  .sg-handoff-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
  .sg-handoff-icon{color:var(--accent)}
  .sg-handoff-title{font-size:14px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--ink-primary)}
  .sg-handoff-desc{font-size:13px;color:var(--ink-muted);line-height:1.5;flex:1}
  .sg-handoff-cta{font-size:12px;font-weight:600;color:var(--accent);margin-top:auto}

  /* ===== Lockups ===== */
  .sg-lockup-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  .sg-lockup-cell{background:#fff;border:1px solid var(--rule);border-radius:10px;overflow:hidden}
  .sg-lockup-demo{padding:40px 24px;background:var(--cream-50);display:flex;align-items:center;justify-content:center;min-height:120px}
  .sg-lockup-meta{padding:14px 18px;border-top:1px solid var(--rule)}
  .sg-lockup-label{font-size:13px;font-weight:600;color:var(--ink-primary);margin-bottom:2px}
  .sg-lockup-use{font-size:12px;color:var(--ink-muted)}

  /* ===== Logo pack ===== */
  .sg-pack-hero{display:grid;grid-template-columns:1.2fr 1fr;gap:18px;margin-bottom:28px}
  .sg-pack-hero-primary{background:var(--cream-50);border:1px solid var(--rule);border-radius:14px;padding:56px 48px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;min-height:280px}
  .sg-pack-hero-mark{color:var(--accent);display:flex}
  .sg-pack-hero-caption{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-muted)}
  .sg-pack-hero-meta{display:flex;flex-direction:column;gap:10px}
  .sg-pack-hero-meta-card{background:#fff;border:1px solid var(--rule);border-radius:12px;padding:18px 20px;display:flex;flex-direction:column;gap:4px}
  .sg-pack-hero-meta-card .k{font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-muted)}
  .sg-pack-hero-meta-card .v{font-size:14px;color:var(--ink-primary);font-weight:500;line-height:1.45}

  .sg-pack-group{margin-bottom:32px}
  .sg-pack-group-head{display:flex;align-items:baseline;justify-content:space-between;margin:8px 0 14px;padding-bottom:10px;border-bottom:1px solid var(--rule)}
  .sg-pack-group-title{font-size:12px;font-family:'JetBrains Mono',monospace;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-primary);font-weight:600}
  .sg-pack-group-count{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--ink-muted)}

  .sg-pack-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .sg-pack-cell{background:#fff;border:1px solid var(--rule);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;text-decoration:none;color:inherit;transition:box-shadow 200ms var(--ease-kit), transform 200ms var(--ease-kit);position:relative}
  .sg-pack-cell:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
  .sg-pack-cell:hover .sg-pack-dl{opacity:1;transform:translateY(0)}
  .sg-pack-preview{min-height:130px;display:flex;align-items:center;justify-content:center;padding:22px;position:relative}
  .sg-pack-preview[data-bg="white"]{background:#fff}
  .sg-pack-preview[data-bg="cream"]{background:var(--cream-100)}
  .sg-pack-preview[data-bg="ink"]{background:var(--ink-primary)}
  .sg-pack-preview[data-bg="transparent"]{background:
    repeating-conic-gradient(#f1eadf 0% 25%, #f7f2e8 25% 50%) 0 0 / 16px 16px}
  .sg-pack-preview svg{max-width:100%;max-height:80px}
  .sg-pack-meta{padding:10px 12px;border-top:1px solid var(--rule);display:flex;flex-direction:column;gap:2px;background:#fff}
  .sg-pack-name{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--ink-primary);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sg-pack-use{font-size:10px;color:var(--ink-muted);font-family:'JetBrains Mono',monospace}
  .sg-pack-dl{position:absolute;top:10px;right:10px;background:var(--ink-primary);color:var(--cream-100);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(-4px);transition:all 200ms var(--ease-kit)}
  .sg-pack-preview[data-bg="ink"] + .sg-pack-meta .sg-pack-dl{background:var(--cream-100);color:var(--ink-primary)}

  .sg-pack-grid.appicon{grid-template-columns:repeat(4,1fr)}
  .sg-pack-grid.appicon .sg-pack-preview{min-height:150px;padding:20px}
  .sg-pack-grid.appicon .sg-pack-preview svg{max-height:110px;max-width:110px;border-radius:22%;box-shadow:0 6px 18px rgba(0,0,0,0.08)}

  .sg-pack-download-all{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;background:var(--ink-primary);color:var(--cream-100);text-decoration:none;border-radius:999px;font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:0.06em;text-transform:uppercase;transition:background 200ms var(--ease-kit)}
  .sg-pack-download-all:hover{background:var(--accent)}
  .sg-pack-download-all svg{width:14px;height:14px}

  /* ===== Print ===== */
  @media print {
    .sg-sidebar{display:none}
    .sg-app{grid-template-columns:1fr;max-width:none}
    .sg-main{padding:24px 36px}
    .sg-section{break-inside:avoid;padding:20px 0 28px}
    .sg-sub{break-inside:avoid}
    .sg-dodont,.sg-split,.sg-handoff-grid{page-break-inside:avoid}
    pre.sg-code{background:#fff;color:#1f1c18;border:1px solid #ccc}
    a{color:inherit}
    body{background:#fff}
    .sg-callout{break-inside:avoid}
  }

  /* ===== Responsive ===== */
  @media (max-width: 1040px) {
    .sg-app{grid-template-columns:1fr}
    .sg-sidebar{position:static;height:auto;border-right:0;border-bottom:1px solid var(--rule)}
    .sg-main{padding:32px 28px 80px}
    .sg-split,.sg-dodont,.sg-radii-grid,.sg-shadow-grid,.sg-handoff-grid,.sg-icon-grid,.sg-lockup-grid,.sg-pack-grid,.sg-pack-hero{grid-template-columns:1fr 1fr}
    .sg-semantic-row{grid-template-columns:40px 1fr 90px;gap:10px}
    .sg-semantic-row code{display:none}
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="style-guide/logo-pack-zip.js"></script>
<script type="text/babel" data-presets="react" src="style-guide/sg-primitives.jsx"></script>
<script type="text/babel" data-presets="react" src="style-guide/sg-foundations.jsx"></script>
<script type="text/babel" data-presets="react" src="style-guide/sg-components.jsx"></script>
<script type="text/babel" data-presets="react" src="style-guide/sg-patterns.jsx"></script>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail" data-bg-color="#f3ece1">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <g transform="translate(600,400)"><g transform="translate(-129,-129) scale(4.4)"><path fill="#b5533d" d="M0 0 C0.70302246 0.00161133 1.40604492 0.00322266 2.13037109 0.00488281 C14.29125048 0.28957634 22.54131281 6.4186563 30.6875 14.88085938 C32.21980719 16.49211145 33.74594919 18.1092509 35.265625 19.73242188 C41.09386122 25.7552653 46.98916399 30.30825617 55.3515625 32.00390625 C66.03649231 31.72272389 71.11174225 27.65535484 78.828125 20.5703125 C85.75174188 14.29438881 90.40793015 12.57304039 99.97265625 12.9609375 C106.80066242 13.82359382 110.81589446 17.29293915 115.02734375 22.59375 C118.94980924 28.30826841 119.03932004 34.81925064 117.890625 41.44921875 C116.05967352 47.7462073 111.70105554 51.93222808 106.25 55.375 C99.5883668 57.83177253 93.8495718 57.83585728 87.25 55.375 C83.54868878 53.33550198 80.77964524 50.95361018 77.875 47.9375 C72.1380232 42.00929064 66.02868156 38.29637743 57.6875 37.9375 C56.23150391 37.84662109 56.23150391 37.84662109 54.74609375 37.75390625 C43.82850812 39.69345498 36.57304259 48.74253124 29.39453125 56.47460938 C22.24320815 63.93917225 14.43275925 69.37894606 3.80493164 69.66772461 C-8.20364465 69.77987665 -16.92216078 66.9231453 -25.75 58.375 C-32.15285988 50.69476159 -34.39668032 41.23586048 -34.09375 31.390625 C-32.96168338 21.45931326 -28.27197697 12.85799873 -20.5078125 6.5546875 C-13.9492795 1.98358874 -8.04830691 -0.01925893 0 0 Z" transform="translate(86.75,94.625)"/></g></g>
  </svg>
</template>

<script type="text/babel" data-presets="react">
/* Main — compose sections + nav */
const SG_NAV = [
  { group:'Foundations', items:[
    { id:'colour',    label:'Colour' },
    { id:'type',      label:'Typography' },
    { id:'spacing',   label:'Spacing & layout' },
    { id:'surface',   label:'Radii & shadows' },
    { id:'motion',    label:'Motion' },
    { id:'icons',     label:'Iconography' },
  ]},
  { group:'Components', items:[
    { id:'buttons',   label:'Buttons' },
    { id:'inputs',    label:'Inputs & forms' },
    { id:'cards',     label:'Cards & surfaces' },
    { id:'progress',  label:'Progress & meters' },
    { id:'chat',      label:'Chat bubbles' },
    { id:'nav',       label:'Navigation' },
    { id:'footer',    label:'Footer' },
    { id:'composer',  label:'Voice composer' },
    { id:'shortlist', label:'Shortlist card' },
  ]},
  { group:'Patterns', items:[
    { id:'grid',      label:'Grid & layout' },
    { id:'brand',     label:'Logomark & wordmark' },
  ]},
  { group:'Handoff', items:[
    { id:'handoff',   label:'Build-ready' },
  ]},
];

const Sidebar = ({ active }) => (
  <aside className="sg-sidebar">
    <div className="sg-sidebar-brand">
      <KitMark size={22} />
      <span>Kit · Style Guide</span>
    </div>
    <div className="sg-sidebar-sub">v1.0 · April 2026</div>
    {SG_NAV.map(g => (
      <div key={g.group} className="sg-nav-group">
        <div className="sg-nav-title">{g.group}</div>
        {g.items.map(it => (
          <a key={it.id} href={`#${it.id}`} className={`sg-nav-link ${active === it.id ? 'active' : ''}`}>{it.label}</a>
        ))}
      </div>
    ))}
  </aside>
);

const Hero = () => (
  <div className="sg-hero">
    <div className="sg-hero-kicker">THE KIT DESIGN SYSTEM</div>
    <h1 className="sg-hero-title">Warm, restrained, <em>editorial where it counts.</em></h1>
    <p className="sg-hero-lede">
      One brand accent. One warm neutral. One display serif — used only in marketing. Everything else is Inter. This guide is engineered so the product team can rebuild 90% of the interface from tokens alone, without touching a serif font.
    </p>
    <div className="sg-hero-meta">
      <span><b>Two surfaces</b> · marketing + app</span>
      <span><b>Three scales</b> · clay, cream, ink</span>
      <span><b>Ships as</b> · tailwind.config.js + tokens.css</span>
      <span><b>Font stack</b> · Inter (app), Fraunces (marketing display)</span>
    </div>
  </div>
);

const App = () => {
  const [active, setActive] = React.useState('colour');
  React.useEffect(() => {
    const ids = SG_NAV.flatMap(g => g.items.map(i => i.id));
    const io = new IntersectionObserver((entries) => {
      const visible = entries.filter(e => e.isIntersecting).sort((a,b) => a.boundingClientRect.top - b.boundingClientRect.top);
      if (visible[0]) setActive(visible[0].target.id);
    }, { rootMargin:'-20% 0px -70% 0px' });
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (el) io.observe(el);
    });
    return () => io.disconnect();
  }, []);
  return (
    <div className="sg-app">
      <Sidebar active={active} />
      <main className="sg-main">
        <Hero />
        <ColourFoundations />
        <TypeFoundations />
        <SpacingFoundations />
        <RadiiShadows />
        <MotionFoundations />
        <IconsFoundations />
        <ButtonsComp />
        <InputsComp />
        <CardsComp />
        <ProgressComp />
        <ChatComp />
        <NavComp />
        <FooterComp />
        <ComposerComp />
        <ShortlistComp />
        <GridPatterns />
        <BrandPatterns />
        <Handoff />
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
