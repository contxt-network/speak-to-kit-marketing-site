/* ---------- Live waveform (eased amplitudes, rAF) — ported from Employers page ---------- */
const Waveform = ({ active = false, bars = 40, color = T.primary, height = 44, thin = true }) => {
  const ref = React.useRef(null);
  const stateRef = React.useRef({ targets:[], current:[], phases:[], t:0 });
  React.useEffect(() => {
    const s = stateRef.current;
    s.targets = Array.from({ length: bars }, () => 0.4);
    s.current = Array.from({ length: bars }, () => 0.4);
    s.phases  = Array.from({ length: bars }, (_, i) => i * 0.47 + Math.random() * 6);
    let raf, last = performance.now(), nextRetarget = 0;
    const tick = (now) => {
      const dt = Math.min(0.05, (now - last)/1000); last = now; s.t += dt;
      if (now > nextRetarget) {
        for (let i = 0; i < bars; i++) {
          s.targets[i] = active ? 0.35 + Math.random()*0.6 : 0.25 + Math.random()*0.22;
        }
        nextRetarget = now + (active ? 140 : 420);
      }
      const ease = active ? 8 : 3.5;
      const el = ref.current;
      if (el) {
        const kids = el.children;
        for (let i = 0; i < bars; i++) {
          s.current[i] += (s.targets[i] - s.current[i]) * Math.min(1, dt * ease);
          const mod = active ? Math.sin(s.t*7 + s.phases[i])*0.08 : Math.sin(s.t*1.4 + s.phases[i])*0.04;
          const a = Math.max(0.08, Math.min(1, s.current[i] + mod));
          const bar = kids[i];
          if (bar) bar.style.height = (a * height).toFixed(1) + 'px';
        }
      }
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [active, bars, height]);
  return (
    <div ref={ref} style={{ display:'flex', alignItems:'center', gap: thin?2:3, height, width:'100%', justifyContent:'center' }}>
      {Array.from({ length: bars }).map((_, i) =>
        <span key={i} style={{
          display:'block', width: thin?3:4, height:`${height*0.3}px`,
          background:color, borderRadius:2, opacity: active?0.92:0.55,
        }} />
      )}
    </div>
  );
};

/* ---------- Login modal ---------- */
const LoginModal = ({ open, onClose }) => {
  const [email, setEmail] = React.useState('');
  const [sent, setSent] = React.useState(false);
  React.useEffect(() => { if (!open) { setSent(false); setEmail(''); } }, [open]);
  if (!open) return null;
  return (
    <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(12,12,12,0.55)', backdropFilter:'blur(6px)', zIndex:200, display:'grid', placeItems:'center', padding:20 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ width:'min(440px, 100%)', background:'#fff', color:T.ink, borderRadius:18, padding:'32px 28px 28px', boxShadow:'0 30px 80px -20px rgba(0,0,0,0.4)', border:`1px solid ${T.rule}` }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:22, color:T.primary }}>
          <KitMark size={24} />
          <span style={{ color:T.ink, fontWeight:700, letterSpacing:'-0.02em', fontSize:15 }}>Continue with Kit</span>
        </div>
        {!sent ? (
          <>
            <h3 style={{ fontSize:22, margin:'0 0 8px', letterSpacing:'-0.02em', fontWeight:600 }}>Start your conversation</h3>
            <p style={{ margin:'0 0 20px', color:T.muted, fontSize:14, lineHeight:1.5 }}>Kit will send a private link to your inbox. Ten minutes, at your pace.</p>
            <label style={{ display:'block', fontSize:12, color:T.muted, marginBottom:6 }}>Your email</label>
            <input value={email} onChange={(e) => setEmail(e.target.value)} placeholder="you@example.com"
                   style={{ width:'100%', padding:'12px 14px', borderRadius:9, border:`1px solid ${T.rule}`, background:'#fafaf8', color:T.ink, outline:'none', fontSize:15 }} />
            <button onClick={() => email.includes('@') && setSent(true)}
                    style={{ marginTop:14, width:'100%', padding:'12px 16px', background:T.primary, color:'#fff', borderRadius:9, fontWeight:600, fontSize:15 }}>
              Continue
            </button>
            <div style={{ textAlign:'center', fontSize:12, color:T.muted, marginTop:14 }}>Confidential by default. No spam, ever.</div>
          </>
        ) : (
          <>
            <h3 style={{ fontSize:22, margin:'0 0 8px', letterSpacing:'-0.02em', fontWeight:600 }}>Check your inbox.</h3>
            <p style={{ margin:'0 0 20px', color:T.muted, fontSize:14, lineHeight:1.5 }}>Kit sent a link to <strong>{email}</strong>. Open it to begin.</p>
            <button onClick={onClose} style={{ width:'100%', padding:'12px 16px', border:`1px solid ${T.rule}`, borderRadius:9, color:T.ink, fontWeight:600 }}>Close</button>

};

/* ---------- Primary "Speak to Kit" button — mic + label ---------- */
const SpeakBtn = ({ onClick, size = 'md', variant = 'primary', children = 'Speak to Kit' }) => {

  const pad = lg ? '16px 28px 16px 22px' : '12px 22px 12px 18px';

  const bg = onCream ? T.primary : T.ink;

/* ---------- Hero voice capsule ---------- */
const HeroCapsule = ({ onSpeak }) => {
  const [recording, setRecording] = React.useState(false);
  const [elapsed, setElapsed] = React.useState(0);
  React.useEffect(() => {
    if (!recording) return;
    setElapsed(0);
    const id = setInterval(() => setElapsed((v) => v + 1), 1000);
    return () => clearInterval(id);
  }, [recording]);
  const toggle = () => {
    if (recording) { setRecording(false); onSpeak(); return; }
    setRecording(true);
  };
  const fmt = (s) => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  return (
    <div style={{ maxWidth:640, margin:'0 auto' }}>
      <div style={{
        background:T.surface, border:`1px solid ${T.rule}`, borderRadius:999,
        boxShadow:'0 22px 60px -22px rgba(26,24,20,0.22)',
        padding:'14px 28px 14px 14px', display:'flex', alignItems:'center', gap:20, height:118,
      }}>
        <button onClick={toggle} aria-label={recording?'Stop':'Tap to speak'} style={{
          width:92, height:92, borderRadius:999, background:T.primary, color:'#fff',
          display:'grid', placeItems:'center',
          boxShadow: recording ? `0 0 0 0 ${T.primary}` : `0 10px 30px -8px ${T.primary}66`,
          animation: recording ? 'stk-pulse 1.6s ease-out infinite' : 'none',
          flexShrink:0, padding:0,
        }}>
          {recording
            ? <span style={{ width:18, height:18, background:'#fff', borderRadius:4 }} />
            : <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="9" y="2" width="6" height="12" rx="3" />
                <path d="M5 10v1a7 7 0 0014 0v-1" />
                <path d="M12 18v4" />
                <path d="M8 22h8" />
              </svg>
          }
        </button>
        <div style={{ flex:1, minWidth:0, display:'flex', flexDirection:'column', gap:8 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', fontSize:13, lineHeight:1 }}>
            <span style={{ color: recording ? T.primary : T.muted, fontWeight:600, letterSpacing:'-0.005em' }}>
              {recording ? 'Listening…' : 'Tap to start. Ten minutes, at your pace.'}
            </span>
            {recording && <span style={{ fontFamily:"'Geist Mono', monospace", fontSize:12, color:T.primary }}>{fmt(elapsed)}</span>}
          </div>
          <Waveform active={recording} color={recording ? T.primary : T.muted} bars={38} height={40} thin />
        </div>
      </div>
      <style>{`@keyframes stk-pulse{0%{box-shadow:0 0 0 0 ${T.primary}66}70%{box-shadow:0 0 0 22px ${T.primary}00}100%{box-shadow:0 0 0 0 ${T.primary}00}}`}</style>
    </div>
  );
};

/* ---------- Conversation mock — animated chat unfold (the "what Kit sounds like" widget) ---------- */
const ConversationMock = () => {
  const script = [
    { who:'kit',  text:'Tell me about a piece of work you\u2019re quietly proud of.' },
    { who:'you',  text:'I rebuilt our onboarding last quarter. Activation went from 38 to 62%.' },
    { who:'kit',  text:'What were the people around you doing while you did that?' },
    { who:'you',  text:'Mostly watching, honestly. My PM was supportive but the execution was mine.' },
    { who:'kit',  text:'Good. That tells me two things about where you\u2019ll thrive next\u2026' },
  ];
  const [shown, setShown] = React.useState(1);
  const [typing, setTyping] = React.useState(false);
  React.useEffect(() => {
    if (shown >= script.length) {
      const r = setTimeout(() => { setShown(1); }, 6000);
      return () => clearTimeout(r);
    }
    setTyping(true);
    const t1 = setTimeout(() => setTyping(false), 1200);
    const t2 = setTimeout(() => setShown((v) => v + 1), 2200);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, [shown]);
  return (
    <div style={{ background:T.surface, border:`1px solid ${T.rule}`, borderRadius:18,
                  boxShadow:'0 22px 60px -22px rgba(26,24,20,0.18)', overflow:'hidden' }}>
      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', gap:12, padding:'18px 22px', borderBottom:`1px solid ${T.rule}`, background:T.surface }}>
        <span style={{ width:8, height:8, borderRadius:999, background:T.success, boxShadow:`0 0 0 4px ${T.success}22`, animation:'stk-livepulse 1.4s ease-in-out infinite' }} />
        <span style={{ fontSize:11, color:T.muted, letterSpacing:'0.2em', fontWeight:600 }}>LIVE · VOICE CONVERSATION</span>
        <span style={{ marginLeft:'auto', fontFamily:"'Geist Mono', monospace", fontSize:11, color:T.muted }}>07:42</span>
      </div>
      {/* Active waveform band */}
      <div style={{ padding:'14px 22px 10px', background:`linear-gradient(to bottom, ${T.primary}06, transparent)` }}>
        <Waveform active={true} color={T.primary} bars={56} height={36} thin />
      </div>
      {/* Transcript — fixed height so the page doesn't reflow as messages arrive */}
      <div className="stk-live-transcript stk-live-transcript--js" style={{ padding:'8px 22px 22px', display:'flex', flexDirection:'column', gap:14, height:520, overflow:'hidden' }}>
        {script.slice(0, shown).map((l, i) => (
          <div key={i} style={{ animation:'stk-fade-in 500ms ease-out both', alignSelf: l.who==='you' ? 'flex-end' : 'flex-start', maxWidth:'86%' }}>
            <div style={{ fontSize:10.5, color: l.who==='kit' ? T.primary : T.muted, fontWeight:600, letterSpacing:'0.16em', marginBottom:4, textAlign: l.who==='you'?'right':'left' }}>
              {l.who==='kit' ? 'KIT' : 'YOU'}
            </div>
            <div style={{
              padding:'12px 16px', borderRadius: 14,
              borderTopLeftRadius: l.who==='kit' ? 4 : 14,
              borderTopRightRadius: l.who==='you' ? 4 : 14,
              fontSize:14.5, lineHeight:1.5,
              background: l.who==='kit' ? T.cream : `${T.primary}15`,
              color: l.who==='kit' ? T.ink : T.primary,
              fontFamily: "'Inter', sans-serif",
              fontStyle: l.who==='kit' ? 'italic' : 'normal',
              fontWeight: 500,
            }}>
              {l.text}
            </div>
          </div>
        ))}
        {typing && shown < script.length && (
          <div style={{ alignSelf: script[shown].who==='you' ? 'flex-end' : 'flex-start', padding:'10px 14px', background: script[shown].who==='kit' ? T.cream : `${T.primary}15`, borderRadius:14, display:'flex', gap:4 }}>
            {[0,1,2].map((i) => <span key={i} style={{ width:6, height:6, borderRadius:999, background: script[shown].who==='kit'?T.muted:T.primary, animation:`stk-typing 1.1s ease-in-out ${i*0.14}s infinite` }} />)}
          </div>
        )}
      </div>
      <style>{`
        @keyframes stk-fade-in{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
        @keyframes stk-livepulse{0%,100%{opacity:1}50%{opacity:0.45}}
        @keyframes stk-typing{0%,60%,100%{opacity:0.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
        @media (max-width: 720px) { .stk-live-transcript--js { height: 700px !important; } }
      `}</style>
    </div>
  );
};

/* ---------- Match widget — "roles where someone already knows you're good" ---------- */
const MatchWidget = () => {
  const roles = [
    { role:'Senior Product Designer',   co:'Ember',       why:'Your old design lead joined last autumn.', fit:94 },
    { role:'Staff Designer, Platform',  co:'Mirrorball',  why:'Two of your ex-colleagues already work here.', fit:89 },
    { role:'Design Manager',            co:'Northbound',  why:'Their VP is someone you shipped with in 2022.', fit:86 },
  ];
  const [revealed, setRevealed] = React.useState(0);
  React.useEffect(() => {
    if (revealed >= roles.length) return;
    const id = setTimeout(() => setRevealed((v) => v + 1), 900);
    return () => clearTimeout(id);
  }, [revealed, roles.length]);
  return (
    <div style={{ background:T.surface, border:`1px solid ${T.rule}`, borderRadius:18,
                  boxShadow:'0 22px 60px -22px rgba(26,24,20,0.18)', padding:'22px 22px 20px' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:14 }}>
        <div style={{ fontSize:11, color:T.primary, letterSpacing:'0.22em', fontWeight:600 }}>AFTER YOUR CONVERSATION</div>
        <div style={{ fontSize:11, color:T.muted, fontFamily:"'Geist Mono', monospace" }}>3 of 14 matches</div>
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
        {roles.map((r, i) => {
          const on = i < revealed;
          return (
            <div key={i} style={{
              position:'relative', display:'grid',
              gridTemplateColumns:'auto 1fr auto', gap:16, alignItems:'center',

/* ---------- Spine node — same pattern as Employers page ---------- */
const SpineNode = ({ n, side = 'left', bg, compact = false, children }) => {
  const isLeft = side === 'left';
  return (
    <div style={{ position:'relative', display:'grid', gridTemplateColumns:'1fr 1fr', columnGap:0, paddingBottom: compact?16:36, minHeight: compact?44:'auto' }}>
      <div style={{ gridColumn:1, paddingRight:52, textAlign:'right', display: isLeft ? 'block' : 'none' }}>{isLeft && children}</div>
      <div style={{
        position:'absolute', left:'50%', top:0, transform:'translateX(-50%)',
        width: compact?32:38, height: compact?32:38, borderRadius:999,
        background: bg, border:`1px solid ${T.primary}`,
        display:'grid', placeItems:'center',
        fontFamily:"'DM Serif Display', serif", fontSize: compact?12:13, color:T.primary, fontWeight:500, zIndex:2,
      }}>{n}</div>
      <div aria-hidden="true" style={{
        position:'absolute', top: compact?16:19,
        left: isLeft ? `calc(50% - ${compact?16:19}px)` : `calc(50% + ${compact?16:19}px)`,
        width:26, transform: isLeft ? 'translateX(-100%)' : 'translateX(0)',
        height:1, background:`${T.primary}66`,
      }} />
      <div style={{ gridColumn:2, paddingLeft:52, textAlign:'left', display: !isLeft ? 'block' : 'none' }}>{!isLeft && children}</div>
    </div>
  );
};

/* ---------- Testimonial carousel — editorial single-quote ---------- */
const TestimonialCarousel = ({ items, speedSec = 6 }) => {
  const [idx, setIdx] = React.useState(0);
  const [paused, setPaused] = React.useState(false);
  React.useEffect(() => {
    if (paused) return;
    const id = setInterval(() => setIdx((v) => (v + 1) % items.length), speedSec * 1000);
    return () => clearInterval(id);
  }, [paused, items.length, speedSec]);
  const t = items[idx];
  return (
    <div onMouseEnter={() => setPaused(true)} onMouseLeave={() => setPaused(false)} style={{ position:'relative', width:'100%' }}>
      <figure key={idx} style={{ margin:0, display:'grid', gridTemplateColumns:'auto 1fr', gap:28, alignItems:'start', width:'100%', animation:'stk-fade-in 480ms ease-out both' }}>
        <div style={{ fontFamily:"'DM Serif Display', serif", fontSize:120, color:T.primary, lineHeight:0.7, letterSpacing:'-0.04em' }}>“</div>
        <div>
          <blockquote style={{ margin:0, fontFamily:"'DM Serif Display', serif", fontStyle:'italic', fontWeight:400, fontSize:'clamp(30px, 3.6vw, 48px)', lineHeight:1.15, letterSpacing:'-0.02em', color:T.ink, textWrap:'pretty' }}>
            {t.quote}
          </blockquote>
          <figcaption style={{ marginTop:24, display:'flex', alignItems:'center', gap:14, fontSize:14, color:T.ink }}>
            <span style={{ fontWeight:600 }}>{t.name}</span>
            <span style={{ width:3, height:3, borderRadius:999, background:T.muted }} />
            <span style={{ color:T.muted }}>{t.tag}</span>
          </figcaption>
        </div>
      </figure>
      <div style={{ display:'flex', justifyContent:'center', alignItems:'center', marginTop:48 }}>
        <div style={{ display:'flex', alignItems:'center', gap:14 }}>
          <div style={{ display:'flex', gap:6 }}>
            {items.map((_, i) =>
              <button key={i} onClick={() => setIdx(i)} aria-label={`Go to ${i+1}`} style={{ width: i===idx?22:7, height:7, borderRadius:999, background: i===idx?T.primary:T.muted, opacity: i===idx?1:0.35, transition:'all 220ms', padding:0 }} />
            )}
          </div>
          <button onClick={() => setIdx((v) => (v - 1 + items.length) % items.length)} aria-label="Previous" style={{ width:38, height:38, borderRadius:999, border:`1px solid ${T.rule}`, color:T.ink, display:'grid', placeItems:'center', marginLeft:8 }}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="15 18 9 12 15 6" /></svg>
          </button>
          <button onClick={() => setIdx((v) => (v + 1) % items.length)} aria-label="Next" style={{ width:38, height:38, borderRadius:999, border:`1px solid ${T.rule}`, color:T.ink, display:'grid', placeItems:'center' }}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="9 18 15 12 9 6" /></svg>
          </button>
        </div>
      </div>
    </div>
  );
};
